name: Smoke Test

on:
  push:
    branches: ["**", "stable/**"]
    paths-ignore: [ '**.md', '**.png', '**.jpg', '**.svg', '**/docs/**' ]
  pull_request:
    branches: ["**", "stable/**"]
    paths-ignore: [ '**.md', '**.png', '**.jpg', '**.svg', '**/docs/**' ]
  schedule:
    # Run daily sanity check at 03:00 clock UTC
    - cron: "0 03 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  contrib-build:
    runs-on: ubuntu-latest-16-cores
    strategy:
      matrix:
        arch: [amd64, arm64, ppc64le, riscv64]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Golang
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.work'
        cache-dependency-path: "**/*.sum"
    - name: Build Contrib
      run: |
        make -e DOCKER=false GOARCH=${{ matrix.arch }} contrib-release
    - name: Upload Nydusify
      if: matrix.arch == 'amd64'
      uses: actions/upload-artifact@v6
      with:
        name: nydusify-artifact
        path: contrib/nydusify/cmd

  contrib-lint:
    runs-on: ubuntu-latest-16-cores
    strategy:
      matrix:
        include:
          - path: contrib/nydusify
          - path: contrib/nydus-overlayfs
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Golang
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.work'
        cache: false
    - name: Lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.1
        working-directory: ${{ matrix.path }}
        args: --timeout=10m --verbose

  nydus-build:
    runs-on: ubuntu-latest-16-cores
    strategy:
      matrix:
        arch: [amd64, arm64, ppc64le, riscv64]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: ${{ runner.os }}-cargo-${{ matrix.arch }}
        save-if: ${{ github.ref == 'refs/heads/master' }}
    - uses: dsherret/rust-toolchain-file@v1
    - name: Read Rust toolchain version
      id: set_toolchain_version
      run: |
        RUST_TOOLCHAIN_VERSION=$(grep -oP '(?<=channel = ")[^"]*' rust-toolchain.toml)
        echo "Rust toolchain version: $RUST_TOOLCHAIN_VERSION"
        echo "rust-version=$RUST_TOOLCHAIN_VERSION" >> $GITHUB_OUTPUT
      shell: bash
    - name: Set up Docker Buildx
      if: matrix.arch == 'riscv64'
      uses: docker/setup-buildx-action@v3
    - name: Build and push Docker image
      if: matrix.arch == 'riscv64'
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./.github/workflows/Dockerfile.cross
        push: false
        load: true
        tags: rust-cross-compile-riscv64:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          RUST_VERSION=${{ steps.set_toolchain_version.outputs.rust-version }}
    - name: Build Nydus Non-RISC-V
      if: matrix.arch != 'riscv64'
      run: |
        declare -A rust_target_map=( ["amd64"]="x86_64-unknown-linux-musl" ["arm64"]="aarch64-unknown-linux-musl" ["ppc64le"]="powerpc64le-unknown-linux-gnu")
        RUST_TARGET=${rust_target_map[${{ matrix.arch }}]}
        cargo install --locked --version 0.2.5 cross
        make -e RUST_TARGET_STATIC=$RUST_TARGET -e CARGO=cross static-release
    - name: Build Nydus RISC-V
      if: matrix.arch == 'riscv64'
      run: |
        RUST_TARGET=riscv64gc-unknown-linux-gnu
        docker run --rm -v ${{ github.workspace }}:/root/src rust-cross-compile-riscv64:latest \
        sh -c "cd /root/src && make -e RUST_TARGET_STATIC=$RUST_TARGET static-release"
    - name: Prepare to upload artifacts
      run: |
        declare -A rust_target_map=( ["amd64"]="x86_64-unknown-linux-musl" ["arm64"]="aarch64-unknown-linux-musl" ["ppc64le"]="powerpc64le-unknown-linux-gnu" ["riscv64"]="riscv64gc-unknown-linux-gnu")
        RUST_TARGET=${rust_target_map[${{ matrix.arch }}]}
        sudo mv target/$RUST_TARGET/release/nydusd .
        sudo mv target/$RUST_TARGET/release/nydus-image .
    - name: Upload Nydus Binaries
      if: matrix.arch == 'amd64'
      uses: actions/upload-artifact@v6
      with:
        name: nydus-artifact
        path: |
          nydus-image
          nydusd

  nydusd-build-macos:
    runs-on: macos-15
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
    - uses: actions/checkout@v6
    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: ${{ runner.os }}-cargo-${{ matrix.arch }}
        save-if: ${{ github.ref == 'refs/heads/master' }}
    - uses: dsherret/rust-toolchain-file@v1
    - name: build
      run: |
        if [[ "${{matrix.arch}}" == "amd64" ]]; then
          RUST_TARGET="x86_64-apple-darwin"
        else
          RUST_TARGET="aarch64-apple-darwin"
        fi
        rustup target add ${RUST_TARGET}
        make -e RUST_TARGET_STATIC=$RUST_TARGET -e static-release

  nydus-integration-test:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest-16-cores
    needs: [contrib-build, nydus-build]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Docker Cache
      uses: jpribyl/action-docker-layer-caching@v0.1.0
      continue-on-error: true
    - name: Download Nydus
      uses: actions/download-artifact@v7
      with:
        name: nydus-artifact
        path: |
          target/release
    - name: Download Nydusify
      uses: actions/download-artifact@v7
      with:
        name: nydusify-artifact
        path: contrib/nydusify/cmd
    - name: Prepare Older Binaries
      id: prepare-binaries
      run: |
        export NYDUS_STABLE_VERSION=$(curl https://api.github.com/repos/Dragonflyoss/nydus/releases/latest | jq -r '.tag_name')

        versions=(v0.1.0 ${NYDUS_STABLE_VERSION})
        version_archs=(v0.1.0-x86_64 ${NYDUS_STABLE_VERSION}-linux-amd64)
        for i in ${!versions[@]}; do
          version=${versions[$i]}
          version_arch=${version_archs[$i]}

          wget -q https://github.com/dragonflyoss/nydus/releases/download/$version/nydus-static-$version_arch.tgz
          sudo mkdir nydus-$version /usr/bin/nydus-$version
          sudo tar xzf nydus-static-$version_arch.tgz -C nydus-$version
          sudo cp -r nydus-$version/nydus-static/* /usr/bin/nydus-$version/
        done
    - name: Setup Golang
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.work'
        cache-dependency-path: "**/*.sum"
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        # this might remove tools that are actually needed,
        # if set to "true" but frees about 6 GB
        tool-cache: false

        # all of these default to true, but feel free to set to
        # "false" if necessary for your workflow
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Integration Test
      run: |
        sudo mkdir -p /usr/bin/nydus-latest /home/runner/work/workdir
        sudo install -D -m 755 contrib/nydusify/cmd/nydusify /usr/bin/nydus-latest
        sudo install -D -m 755 target/release/nydusd target/release/nydus-image /usr/bin/nydus-latest
        sudo bash misc/prepare.sh

        export NYDUS_STABLE_VERSION=$(curl https://api.github.com/repos/Dragonflyoss/nydus/releases/latest | jq -r '.tag_name')
        export NYDUS_STABLE_VERSION_EXPORT="${NYDUS_STABLE_VERSION//./_}"

        versions=(v0.1.0 ${NYDUS_STABLE_VERSION} latest)
        version_exports=(v0_1_0 ${NYDUS_STABLE_VERSION_EXPORT} latest)
        for i in ${!version_exports[@]}; do
          version=${versions[$i]}
          version_export=${version_exports[$i]}
          export NYDUS_BUILDER_$version_export=/usr/bin/nydus-$version/nydus-image
          export NYDUS_NYDUSD_$version_export=/usr/bin/nydus-$version/nydusd
          export NYDUS_NYDUSIFY_$version_export=/usr/bin/nydus-$version/nydusify
        done

        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sudo sh -s -- -b /usr/bin v2.1.6
        sudo -E make smoke-only

  nydus-unit-test:
    runs-on: ubuntu-latest-16-cores
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: Linux-cargo-amd64
        save-if: ${{ github.ref == 'refs/heads/master' }}
    - name: Install cargo nextest
      uses: taiki-e/install-action@nextest
    - name: Fscache Setup
      run: sudo bash misc/fscache/setup.sh
    - name: Unit Test
      run: |
        CARGO_HOME=${HOME}/.cargo
        CARGO_BIN=$(which cargo)
        RUSTUP_BIN=$(which rustup)
        sudo -E RUSTUP=${RUSTUP_BIN} make ut-nextest

  contrib-unit-test-coverage:
    runs-on: ubuntu-latest-16-cores
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Golang
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.work'
        cache-dependency-path: "**/*.sum"
    - name: Unit Test
      run: |
        make -e DOCKER=false contrib-test
    - name: Upload contrib coverage file
      uses: actions/upload-artifact@v6
      with:
        name: contrib-test-coverage-artifact
        path: |
          contrib/nydusify/coverage.txt

  nydus-unit-test-coverage:
    runs-on: ubuntu-latest-16-cores
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: Linux-cargo-amd64
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Fscache Setup
        run: sudo bash misc/fscache/setup.sh
      - name: Generate code coverage
        run: |
          CARGO_HOME=${HOME}/.cargo
          CARGO_BIN=$(which cargo)
          RUSTUP_BIN=$(which rustup)
          sudo -E RUSTUP=${RUSTUP_BIN} make coverage-codecov
      - name: Upload nydus coverage file
        uses: actions/upload-artifact@v6
        with:
          name: nydus-test-coverage-artifact
          path: |
            codecov.json

  nydus-integration-test-coverage:
    if: github.event_name == 'pull_request'
    needs: [contrib-build]
    runs-on: ubuntu-latest-16-cores
    env:
      CARGO_TERM_COLOR: always
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: Linux-cargo-amd64-coverage
        save-if: ${{ github.ref == 'refs/heads/master' }}
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Setup Golang
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.work'
        cache-dependency-path: "**/*.sum"
    - name: Build instrumented Nydusify
      shell: bash
      run: |
        pushd contrib/nydusify >/dev/null
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
          -cover \
          -covermode=atomic \
          -coverpkg=./... \
          -o ./cmd/nydusify \
          ./cmd
        popd >/dev/null
        echo "Built instrumented Go binary:"
        ls -l contrib/nydusify/cmd/nydusify
        contrib/nydusify/cmd/nydusify --version || true
    - name: Fscache Setup
      run: sudo bash misc/fscache/setup.sh
    - name: Prepare Older Binaries
      run: |
        export NYDUS_STABLE_VERSION=$(curl https://api.github.com/repos/Dragonflyoss/nydus/releases/latest | jq -r '.tag_name')

        versions=(v0.1.0 ${NYDUS_STABLE_VERSION})
        version_archs=(v0.1.0-x86_64 ${NYDUS_STABLE_VERSION}-linux-amd64)
        for i in ${!versions[@]}; do
          version=${versions[$i]}
          version_arch=${version_archs[$i]}

          wget -q https://github.com/dragonflyoss/nydus/releases/download/$version/nydus-static-$version_arch.tgz
          sudo mkdir -p nydus-$version /usr/bin/nydus-$version
          sudo tar xzf nydus-static-$version_arch.tgz -C nydus-$version
          sudo cp -r nydus-$version/nydus-static/* /usr/bin/nydus-$version/
        done
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Generate integration coverage
      shell: bash
      run: |
        export GO_BINARY_COVERDIR="${RUNNER_TEMP}/nydus-go-binary-coverage"
        export GO_TEST_BUILD_FLAGS='-cover -covermode=atomic -coverpkg=./...'
        rm -rf "${GO_BINARY_COVERDIR}"
        mkdir -p "${GO_BINARY_COVERDIR}"

        source <(cargo llvm-cov show-env --sh)
        export LLVM_PROFILE_FILE="${CARGO_LLVM_COV_TARGET_DIR}/smoke-%p-%m.profraw"
        echo "Coverage environment before build:"
        echo "  LLVM_PROFILE_FILE=${LLVM_PROFILE_FILE}"
        echo "  CARGO_LLVM_COV_TARGET_DIR=${CARGO_LLVM_COV_TARGET_DIR}"
        echo "  RUSTFLAGS=${RUSTFLAGS}"
        echo "  GO_BINARY_COVERDIR=${GO_BINARY_COVERDIR}"
        echo "  GO_TEST_BUILD_FLAGS=${GO_TEST_BUILD_FLAGS}"
        cargo llvm-cov clean --workspace
        cargo build --release --features=virtiofs --bins
        echo "Built instrumented binaries:"
        ls -l target/release/nydusd target/release/nydus-image contrib/nydusify/cmd/nydusify
        target/release/nydusd --version || true
        target/release/nydus-image --version || true
        cargo llvm-cov clean --workspace --profraw-only
        mapfile -t build_profraw_files < <(find "${CARGO_LLVM_COV_TARGET_DIR}" -maxdepth 1 -name '*.profraw' -print | sort)
        echo "Residual profraw files after build cleanup: ${#build_profraw_files[@]}"
        if [ ${#build_profraw_files[@]} -ne 0 ]; then
          printf '%s\n' "${build_profraw_files[@]}"
          echo "Build cleanup left profraw files behind" >&2
          exit 1
        fi

        sudo mkdir -p /usr/bin/nydus-latest /home/runner/work/workdir
        sudo install -D -m 755 contrib/nydusify/cmd/nydusify /usr/bin/nydus-latest/nydusify
        sudo install -D -m 755 target/release/nydusd /usr/bin/nydus-latest/nydusd.real
        sudo install -D -m 755 target/release/nydus-image /usr/bin/nydus-latest/nydus-image.real
        sudo tee /usr/bin/nydus-latest/nydusd >/dev/null <<EOF
        #!/bin/sh
        export LLVM_PROFILE_FILE='${LLVM_PROFILE_FILE}'
        exec /usr/bin/nydus-latest/nydusd.real "\$@"
        EOF
        sudo tee /usr/bin/nydus-latest/nydus-image >/dev/null <<EOF
        #!/bin/sh
        export LLVM_PROFILE_FILE='${LLVM_PROFILE_FILE}'
        exec /usr/bin/nydus-latest/nydus-image.real "\$@"
        EOF
        sudo chmod 755 /usr/bin/nydus-latest/nydusd /usr/bin/nydus-latest/nydus-image
        sudo bash misc/prepare.sh

        echo "Installed latest binaries:"
        ls -l /usr/bin/nydus-latest

        export NYDUS_STABLE_VERSION=$(curl https://api.github.com/repos/Dragonflyoss/nydus/releases/latest | jq -r '.tag_name')
        export NYDUS_STABLE_VERSION_EXPORT="${NYDUS_STABLE_VERSION//./_}"

        versions=(v0.1.0 ${NYDUS_STABLE_VERSION} latest)
        version_exports=(v0_1_0 ${NYDUS_STABLE_VERSION_EXPORT} latest)
        for i in ${!version_exports[@]}; do
          version=${versions[$i]}
          version_export=${version_exports[$i]}
          export NYDUS_BUILDER_$version_export=/usr/bin/nydus-$version/nydus-image
          export NYDUS_NYDUSD_$version_export=/usr/bin/nydus-$version/nydusd
          export NYDUS_NYDUSIFY_$version_export=/usr/bin/nydus-$version/nydusify
        done

        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sudo sh -s -- -b /usr/bin v2.1.6
        export GOCOVERDIR="${GO_BINARY_COVERDIR}"
        echo "Smoke binary environment:"
        env | grep '^NYDUS_' | sort
        echo "GOCOVERDIR=${GOCOVERDIR}"
        echo "GO_TEST_BUILD_FLAGS=${GO_TEST_BUILD_FLAGS}"
        echo "LLVM_PROFILE_FILE=${LLVM_PROFILE_FILE}"
        sudo -E env | grep '^LLVM_PROFILE_FILE='
        sudo -E env | grep '^GOCOVERDIR='
        sudo -E env | grep '^GO_TEST_BUILD_FLAGS='
        sudo -E env | grep '^NYDUS_' | sort

        echo "Rust binary coverage probe before smoke:"
        sudo -E /usr/bin/nydus-latest/nydus-image --version || true
        mapfile -t probe_profraw_files < <(find "${CARGO_LLVM_COV_TARGET_DIR}" -maxdepth 1 -name '*.profraw' -print | sort)
        echo "Generated ${#probe_profraw_files[@]} probe profraw files"
        printf '%s\n' "${probe_profraw_files[@]}"
        cargo llvm-cov clean --workspace --profraw-only

        sudo -E make smoke-only

        mapfile -t profraw_files < <(find "${CARGO_LLVM_COV_TARGET_DIR}" -maxdepth 1 -name '*.profraw' -print | sort)
        echo "Generated ${#profraw_files[@]} smoke profraw files"
        if [ ${#profraw_files[@]} -eq 0 ]; then
          echo "No smoke profraw files were generated under ${CARGO_LLVM_COV_TARGET_DIR}" >&2
          exit 1
        fi
        printf '%s\n' "${profraw_files[@]}"
        echo "Smoke profraw details:"
        stat --printf='%n %s bytes %U:%G\n' "${profraw_files[@]}"

        mapfile -t go_cover_files < <(find "${GO_BINARY_COVERDIR}" -maxdepth 1 -type f -print | sort)
        echo "Generated ${#go_cover_files[@]} Go coverage raw files"
        if [ ${#go_cover_files[@]} -eq 0 ]; then
          echo "No Go coverage raw files were generated under ${GO_BINARY_COVERDIR}" >&2
          exit 1
        fi
        printf '%s\n' "${go_cover_files[@]}"
        echo "Go coverage raw file details:"
        stat --printf='%n %s bytes %U:%G\n' "${go_cover_files[@]}"
        go tool covdata percent -i="${GO_BINARY_COVERDIR}" | tee smoke-go-coverage-percent.txt
        go tool covdata textfmt -i="${GO_BINARY_COVERDIR}" -o smoke-go-coverage.txt
        go tool cover -func=smoke-go-coverage.txt | tee smoke-go-coverage-summary.txt
        echo "Smoke Go coverage summary preview:"
        sed -n '1,120p' smoke-go-coverage-summary.txt

        cargo llvm-cov report --release --codecov --output-path smoke-codecov.json
        cargo llvm-cov report --release --json --summary-only --output-path smoke-summary.json
        cargo llvm-cov report --release --text --show-missing-lines --output-path smoke-missing-lines.txt || true

        echo "Smoke coverage summary preview:"
        python3 - <<'PY'
        import json
        from pathlib import Path

        summary = json.loads(Path('smoke-summary.json').read_text())
        data = summary.get('data', [])
        totals = []
        files = []
        for item in data:
            totals.extend(item.get('totals', []))
            files.extend(item.get('files', []))
        print({'data_sections': len(data), 'files': len(files), 'totals': totals[:1]})
        top = []
        for file_info in files:
            filename = file_info.get('filename')
            summary = file_info.get('summary', {})
            lines = summary.get('lines', {})
            count = lines.get('count', 0) or 0
            covered = lines.get('covered', 0) or 0
            percent = lines.get('percent', 0) or 0
            top.append((percent, covered, count, filename))
        for percent, covered, count, filename in sorted(top)[:20]:
            print(f'{percent:6.2f}% {covered:5}/{count:<5} {filename}')
        PY
        echo "Smoke missing lines preview:"
        sed -n '1,120p' smoke-missing-lines.txt || true
    - name: Upload integration coverage file
      uses: actions/upload-artifact@v6
      with:
        name: nydus-integration-test-coverage-artifact
        path: |
          smoke-codecov.json
          smoke-go-coverage.txt
          smoke-go-coverage-percent.txt
          smoke-go-coverage-summary.txt
          smoke-summary.json
          smoke-missing-lines.txt

  upload-coverage-to-codecov:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest-16-cores
    needs: [contrib-unit-test-coverage, nydus-unit-test-coverage]
    env:
      COVERAGE_FILES: ./codecov.json ./coverage.txt
    steps:
    - uses: actions/checkout@v6
    - name: Download nydus coverage file
      uses: actions/download-artifact@v7
      with:
        name: nydus-test-coverage-artifact
    - name: Download contrib coverage file
      uses: actions/download-artifact@v7
      with:
        name: contrib-test-coverage-artifact
    - name: Print aggregated coverage preview
      shell: bash
      run: |
        python3 - <<'PY'
        import json
        import os
        import re
        from pathlib import Path

        files = os.environ["COVERAGE_FILES"].split()
        aggregated_line_states = {}

        def merge_line(target, path, line_no, covered):
            key = (path, int(line_no))
            target[key] = target.get(key, False) or covered

        def parse_codecov_value(value):
            if value is None:
                return None
            if isinstance(value, (int, float)):
                return value > 0
            if isinstance(value, str):
                if "/" in value:
                    hit, _total = value.split("/", 1)
                    return int(hit) > 0
                try:
                    return float(value) > 0
                except ValueError:
                    return None
            return None

        for file_name in files:
            per_file_line_states = {}
            path = Path(file_name)
            if path.suffix == ".json":
                data = json.loads(path.read_text())
                for source, coverage in data.get("coverage", {}).items():
                    for line_no, value in coverage.items():
                        covered = parse_codecov_value(value)
                        if covered is not None:
                            merge_line(per_file_line_states, source, line_no, covered)
            elif path.suffix == ".txt":
                for raw in path.read_text().splitlines():
                    raw = raw.strip()
                    if not raw or raw.startswith("mode:"):
                        continue
                    match = re.match(r"(.+):(\d+)\.\d+,(\d+)\.\d+\s+\d+\s+(\d+)", raw)
                    if not match:
                        continue
                    source, start_line, end_line, count = match.groups()
                    covered = int(count) > 0
                    for line_no in range(int(start_line), int(end_line) + 1):
                        merge_line(per_file_line_states, source, line_no, covered)

            per_file_total = len(per_file_line_states)
            per_file_covered = sum(1 for covered in per_file_line_states.values() if covered)
            per_file_ratio = (per_file_covered / per_file_total * 100.0) if per_file_total else 0.0
            print(
                f"Coverage preview for {file_name}: "
                f"{per_file_covered}/{per_file_total} lines = {per_file_ratio:.2f}%"
            )
            for key, covered in per_file_line_states.items():
                aggregated_line_states[key] = aggregated_line_states.get(key, False) or covered

        total = len(aggregated_line_states)
        covered = sum(1 for covered in aggregated_line_states.values() if covered)
        ratio = (covered / total * 100.0) if total else 0.0
        print(f"Aggregated coverage preview: {covered}/{total} lines = {ratio:.2f}%")
        print("Coverage inputs:")
        for file_name in files:
            print(f"- {file_name}")
        PY
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        files: ./codecov.json,./coverage.txt
        verbose: true
        fail_ci_if_error: true

  upload-pr-coverage-to-codecov:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest-16-cores
    needs: [contrib-unit-test-coverage, nydus-unit-test-coverage, nydus-integration-test-coverage]
    env:
      COVERAGE_FILES: ./codecov.json ./coverage.txt ./smoke-codecov.json ./smoke-go-coverage.txt
    steps:
    - uses: actions/checkout@v6
    - name: Download nydus coverage file
      uses: actions/download-artifact@v7
      with:
        name: nydus-test-coverage-artifact
    - name: Download contrib coverage file
      uses: actions/download-artifact@v7
      with:
        name: contrib-test-coverage-artifact
    - name: Download nydus integration coverage file
      uses: actions/download-artifact@v7
      with:
        name: nydus-integration-test-coverage-artifact
    - name: Print aggregated coverage preview
      shell: bash
      run: |
        python3 - <<'PY'
        import json
        import os
        import re
        from pathlib import Path

        files = os.environ["COVERAGE_FILES"].split()
        aggregated_line_states = {}

        def merge_line(target, path, line_no, covered):
            key = (path, int(line_no))
            target[key] = target.get(key, False) or covered

        def parse_codecov_value(value):
            if value is None:
                return None
            if isinstance(value, (int, float)):
                return value > 0
            if isinstance(value, str):
                if "/" in value:
                    hit, _total = value.split("/", 1)
                    return int(hit) > 0
                try:
                    return float(value) > 0
                except ValueError:
                    return None
            return None

        for file_name in files:
            per_file_line_states = {}
            path = Path(file_name)
            if path.suffix == ".json":
                data = json.loads(path.read_text())
                for source, coverage in data.get("coverage", {}).items():
                    for line_no, value in coverage.items():
                        covered = parse_codecov_value(value)
                        if covered is not None:
                            merge_line(per_file_line_states, source, line_no, covered)
            elif path.suffix == ".txt":
                for raw in path.read_text().splitlines():
                    raw = raw.strip()
                    if not raw or raw.startswith("mode:"):
                        continue
                    match = re.match(r"(.+):(\d+)\.\d+,(\d+)\.\d+\s+\d+\s+(\d+)", raw)
                    if not match:
                        continue
                    source, start_line, end_line, count = match.groups()
                    covered = int(count) > 0
                    for line_no in range(int(start_line), int(end_line) + 1):
                        merge_line(per_file_line_states, source, line_no, covered)

            per_file_total = len(per_file_line_states)
            per_file_covered = sum(1 for covered in per_file_line_states.values() if covered)
            per_file_ratio = (per_file_covered / per_file_total * 100.0) if per_file_total else 0.0
            print(
                f"Coverage preview for {file_name}: "
                f"{per_file_covered}/{per_file_total} lines = {per_file_ratio:.2f}%"
            )
            for key, covered in per_file_line_states.items():
                aggregated_line_states[key] = aggregated_line_states.get(key, False) or covered

        total = len(aggregated_line_states)
        covered = sum(1 for covered in aggregated_line_states.values() if covered)
        ratio = (covered / total * 100.0) if total else 0.0
        print(f"Aggregated coverage preview: {covered}/{total} lines = {ratio:.2f}%")
        print("Coverage inputs:")
        for file_name in files:
            print(f"- {file_name}")
        PY
    - name: Upload merged coverage to Codecov
      uses: codecov/codecov-action@v5
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        files: ./codecov.json,./coverage.txt,./smoke-codecov.json,./smoke-go-coverage.txt
        verbose: true
        fail_ci_if_error: true

  nydus-cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Read Rust toolchain version
        id: set_toolchain_version
        run: |
          RUST_TOOLCHAIN_VERSION=$(grep -oP '(?<=channel = ")[^"]*' rust-toolchain.toml)
          echo "Rust toolchain version: $RUST_TOOLCHAIN_VERSION"
          echo "rust-version=$RUST_TOOLCHAIN_VERSION" >> $GITHUB_OUTPUT
        shell: bash
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: ${{ steps.set_toolchain_version.outputs.rust-version }}

  performance-test:
    runs-on: ubuntu-latest-16-cores
    needs: [contrib-build, nydus-build]
    strategy:
      matrix:
        include:
          - mode: fs-version-5
          - mode: fs-version-6
          - mode: zran
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Download Nydus
      uses: actions/download-artifact@v7
      with:
        name: nydus-artifact
        path: target/release
    - name: Download Nydusify
      uses: actions/download-artifact@v7
      with:
        name: nydusify-artifact
        path: contrib/nydusify/cmd
    - name: Prepare Nydus Container Environment
      run: |
        sudo bash misc/prepare.sh
    - name: Performance Test
      run: |
        export PERFORMANCE_TEST_MODE=${{ matrix.mode }}
        sudo -E make smoke-performance

  takeover-test:
    runs-on: ubuntu-latest-16-cores
    needs: [contrib-build, nydus-build]
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Download Nydus
      uses: actions/download-artifact@v7
      with:
        name: nydus-artifact
        path: target/release
    - name: Download Nydusify
      uses: actions/download-artifact@v7
      with:
        name: nydusify-artifact
        path: contrib/nydusify/cmd
    - name: Prepare Nydus Container Environment
      run: |
        sudo bash misc/prepare.sh takeover_test
    - name: Takeover Test
      run: |
        export NEW_NYDUSD_BINARY_PATH=target/release/nydusd
        sudo -E make smoke-takeover
