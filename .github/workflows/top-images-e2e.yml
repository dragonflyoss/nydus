name: Top Images E2E

# Manually-triggered end-to-end test that converts and validates the top
# Docker Hub images with leptonify, pushing the converted lepton images straight
# to this repository's GHCR namespace over HTTPS.
on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Number of images converted/checked in parallel"
        required: false
        default: "5"
      registry:
        description: "Target registry/namespace for the converted lepton images"
        required: false
        default: ""

env:
  RUST_BACKTRACE: 1

permissions:
  contents: read
  packages: write

jobs:
  top-images-e2e:
    name: Convert and validate top images
    runs-on: ${{ vars.RUNNER_OS || 'ubuntu-latest' }}
    timeout-minutes: 150
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # The convert/check pipeline stages many multi-gigabyte images. The
      # per-image scratch work directories are placed on the large /mnt
      # ephemeral disk (see the test step). The converted lepton images are
      # pushed straight to GHCR (no local registry), but the pulled source
      # blobs and the Rust/Go build still live on the smaller root volume.
      # Reclaim the ~25GB of preinstalled toolchains we do not use so the root
      # volume does not run out of space ("no space left on device").
      - name: Free up disk space
        run: |
          echo "Disk usage before cleanup:"
          df -h / /mnt
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/share/boost \
            /usr/lib/jvm || true
          sudo docker image prune --all --force || true
          echo "Disk usage after cleanup:"
          df -h / /mnt

      - name: Install Docker
        uses: docker/setup-docker-action@v4

      # The image list points at GHCR mirrors (see mirror-top-images.yml) and
      # the converted lepton images are pushed back to the same GHCR namespace;
      # authenticate so packages can be pulled and pushed.
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          sudo mkdir -p /root/.docker
          sudo cp "$HOME/.docker/config.json" /root/.docker/config.json

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Build leptonify
        run: |
          make -C leptonify build
          sudo install -m 0755 leptonify/leptonify /usr/local/bin/leptonify

      - name: Run top-images e2e test
        env:
          # Push the converted lepton images straight to this repository's GHCR
          # namespace (over HTTPS) instead of a local registry, so the runner's
          # root volume is not filled by the pushed-back images.
          REGISTRY_INPUT: ${{ github.event.inputs.registry }}
          DEFAULT_REGISTRY: ghcr.io/${{ github.repository }}
        run: |
          # Convert/check stage many multi-gigabyte images in parallel. The
          # default temp filesystem lives on the small root volume, so place the
          # scratch work directories on the larger /mnt ephemeral disk to avoid
          # "no space left on device". The test removes each image's work dir as
          # soon as it finishes, regardless of success.
          sudo mkdir -p /mnt/leptonify-top-images
          sudo chmod 0777 /mnt/leptonify-top-images
          df -h / /mnt
          registry="${REGISTRY_INPUT:-$DEFAULT_REGISTRY}"
          # Converting/checking the full top-images list (120 images) at the
          # default concurrency takes well over an hour, so the Go test's own
          # -timeout must fit the job budget. Give the suite 140m — comfortably
          # above the observed runtime — while staying 10m under the job's
          # 150-minute timeout-minutes so a genuine hang still self-aborts with
          # a goroutine dump before the runner hard-kills the job.
          make test-top-images \
            TOP_IMAGES_TIMEOUT="140m" \
            TOP_IMAGES_CONCURRENCY="${{ github.event.inputs.concurrency }}" \
            TOP_IMAGES_REGISTRY="$registry" \
            TOP_IMAGES_PLAIN_HTTP="false" \
            TOP_IMAGES_PLATFORM="linux/amd64" \
            TOP_IMAGES_WORKDIR="/mnt/leptonify-top-images"
