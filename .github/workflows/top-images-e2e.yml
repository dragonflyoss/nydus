name: Top Images E2E

# Manually-triggered end-to-end test that converts and validates the top
# Docker Hub images with leptonify against a local registry.
on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Number of images converted/checked in parallel"
        required: false
        default: "5"
      registry:
        description: "Target registry for the converted images"
        required: false
        default: "localhost:5000"

env:
  RUST_BACKTRACE: 1

permissions:
  contents: read
  packages: read

jobs:
  top-images-e2e:
    name: Convert and validate top images
    runs-on: ${{ vars.RUNNER_OS || 'ubuntu-latest' }}
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # The convert/check pipeline stages many multi-gigabyte images. The
      # per-image scratch work directories are placed on the large /mnt
      # ephemeral disk (see the test step), but the local registry, the Docker
      # daemon data dir and the Rust/Go build all live on the smaller root
      # volume. Reclaim the ~25GB of preinstalled toolchains we do not use so
      # the root volume does not run out of space ("no space left on device").
      - name: Free up disk space
        run: |
          echo "Disk usage before cleanup:"
          df -h / /mnt
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/share/boost \
            /usr/lib/jvm || true
          sudo docker image prune --all --force || true
          echo "Disk usage after cleanup:"
          df -h / /mnt

      - name: Install Docker
        uses: docker/setup-docker-action@v4

      # The image list points at GHCR mirrors (see mirror-top-images.yml);
      # authenticate so private packages can be pulled.
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          sudo mkdir -p /root/.docker
          sudo cp "$HOME/.docker/config.json" /root/.docker/config.json

      - name: Start local registry
        run: |
          # Cap the registry container's json-file log so a long run cannot fill
          # the root volume with daemon logs (each converted image is pushed
          # here for the check stage to pull back).
          docker run -d -p 5000:5000 --restart always --name registry \
            --log-opt max-size=50m --log-opt max-file=3 \
            distribution/distribution

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.5'

      - name: Build leptonify
        run: |
          make -C leptonify build
          sudo install -m 0755 leptonify/leptonify /usr/local/bin/leptonify

      - name: Run top-images e2e test
        run: |
          # Convert/check stage many multi-gigabyte images in parallel. The
          # default temp filesystem lives on the small root volume, so place the
          # scratch work directories on the larger /mnt ephemeral disk to avoid
          # "no space left on device". The test removes each image's work dir as
          # soon as it finishes, regardless of success.
          sudo mkdir -p /mnt/leptonify-top-images
          sudo chmod 0777 /mnt/leptonify-top-images
          df -h / /mnt
          make test-top-images \
            TOP_IMAGES_CONCURRENCY="${{ github.event.inputs.concurrency }}" \
            TOP_IMAGES_REGISTRY="${{ github.event.inputs.registry }}" \
            TOP_IMAGES_WORKDIR="/mnt/leptonify-top-images"
