name: integration-tests

on:
  push:
    branches: '*'
  pull_request:
    branches: [ main, master ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout erofs-utils-rust
      uses: actions/checkout@v4
      with:
        path: erofs-utils-rust

    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        profile: minimal
        toolchain: stable
        override: true

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build and install erofs binaries
      run: |
        cd erofs-utils-rust
        cargo build --release
        sudo install -m 700 ./target/release/erofs-mkfs /usr/sbin/
        sudo install -m 700 ./target/release/erofs-fuse /usr/sbin/

    - name: Run integration tests (verify + xfstests)
      run: |
        cd erofs-utils-rust
        make test-integration
