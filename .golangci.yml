version: "2"

run:
  timeout: 10m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - misspell
    - unconvert
  settings:
    misspell:
      # "hardlinked" is a valid technical term; misspell flags it as "hardline".
      ignore-rules:
        - hardlinked

formatters:
  enable:
    - gofmt
    - goimports
