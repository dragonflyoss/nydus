[package]
name = "mkfs-erofs"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "erofs-mkfs"
path = "src/bin/erofs-mkfs.rs"

[[bin]]
name = "erofs-fuse"
path = "src/bin/erofs-fuse.rs"

[dependencies]
anyhow = "1"
blake3 = "1"
clap = { version = "4", features = ["derive"] }
crc32c = "0.6"
fuser = "0.17"
libc = "0.2"
log = "0.4"
memmap2 = "0.9"
signal-hook = "0.3"
simple_logger = "4"
tokio = { version = "1", features = [
  "fs",
  "io-util",
  "net",
  "rt",
  "rt-multi-thread"
] }
uuid = { version = "1", features = ["v4"] }
xattr = "1"

[profile.bench]
debug = true

[profile.dev]
opt-level = 0
debug = true
strip = false
incremental = true

[profile.release]
opt-level = 3
strip = "symbols"
lto = "thin"
panic = "abort"
codegen-units = 1
