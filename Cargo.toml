[package]
name = "lepton"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "lepton"
path = "src/bin/lepton/main.rs"

[dependencies]
anyhow = "1"
bitflags = "2"
blake3 = "1"
clap = { version = "4", features = ["derive"] }
crc32c = "0.6"
fuser = "0.17"
libc = "0.2"
log = "0.4"
memmap2 = "0.9"
rolling-file = "0.2.0"
sha2 = "0.10"
signal-hook = "0.3"
tempfile = "3.25.0"
tokio = { version = "1", features = [
  "fs",
  "io-util",
  "net",
  "rt",
  "rt-multi-thread"
] }
tracing = "0.1"
tracing-appender = "0.2.4"
tracing-panic = "0.1.2"
tracing-subscriber = { version = "0.3", features = [
  "chrono",
  "env-filter",
  "time"
] }
uuid = { version = "1", features = ["v4"] }
xattr = "1"
zstd = "0.13"

[profile.bench]
debug = true

[profile.dev]
opt-level = 0
debug = true
strip = false
incremental = true

[profile.release]
opt-level = 3
strip = "symbols"
lto = "thin"
panic = "abort"
codegen-units = 1
